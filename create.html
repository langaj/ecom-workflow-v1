<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Ecom Workflow - 创建任务</title>
  <link rel="stylesheet" href="assets/css/style.css">
</head>
<body>
  <div class="app-layout">
    <aside class="sidebar">
      <div class="sidebar-brand"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M4 7V4h16v3"/><path d="M9 20h6"/><path d="M12 4v16"/><rect x="3" y="7" width="18" height="13" rx="2"/></svg><span>Ecom Workflow</span></div>
      <nav class="sidebar-nav">
        <a href="index.html"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="3" width="7" height="7"/><rect x="14" y="3" width="7" height="7"/><rect x="14" y="14" width="7" height="7"/><rect x="3" y="14" width="7" height="7"/></svg><span>仪表盘</span></a>
        <a href="jobs.html"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M9 5H7a2 2 0 00-2 2v12a2 2 0 002 2h10a2 2 0 002-2V7a2 2 0 00-2-2h-2"/><rect x="9" y="3" width="6" height="4" rx="1"/><path d="M9 14l2 2 4-4"/></svg><span>任务列表</span></a>
        <a href="create.html" class="active"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="10"/><path d="M12 8v8M8 12h8"/></svg><span>创建任务</span></a>
        <a href="config.html"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="3"/><path d="M12 1v2M12 21v2M4.22 4.22l1.42 1.42M18.36 18.36l1.42 1.42M1 12h2M21 12h2M4.22 19.78l1.42-1.42M18.36 5.64l1.42-1.42"/></svg><span>系统配置</span></a>
      </nav>
    </aside>
    <div class="main-area">
      <header class="topbar"><h1 class="topbar-title">创建任务</h1></header>
      <main class="page-content">
        <form id="create-form">
          <div class="card">
            <div class="card-header"><span class="card-title">任务信息</span></div>
            <div class="form-row">
              <div class="form-group">
                <label class="form-label" for="taskName">任务名称</label>
                <input class="form-input" id="taskName" name="taskName" required placeholder="例：夏季防晒霜套图">
              </div>
              <div class="form-group">
                <label class="form-label" for="workflowMode">工作流模式</label>
                <select class="form-select" id="workflowMode" name="workflowMode">
                  <option value="auto">自动（完整工作流）</option>
                  <option value="manual">手动（测试用，单步执行）</option>
                </select>
              </div>
            </div>
            <div class="form-group">
              <label class="form-label" for="requirement">需求描述</label>
              <textarea class="form-textarea" id="requirement" name="requirement" placeholder="描述产品特点、风格要求、目标市场、语言等..." rows="3"></textarea>
            </div>
          </div>
          <div class="card">
            <div class="card-header"><span class="card-title">商品信息（选填）</span></div>
            <div class="form-group">
              <div style="color:var(--gray-400);font-size:0.85rem;margin-bottom:8px;">有参考图的情况下可以不填，AI 会从图片识别</div>
              <input class="form-input" id="productName" name="productName" placeholder="产品名称（选填）">
            </div>
          </div>
          <div class="card">
            <div class="card-header"><span class="card-title">参考图</span></div>
            <div class="upload-zone" id="reference-upload">
              <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 15v4a2 2 0 01-2 2H5a2 2 0 01-2-2v-4"/><polyline points="17 8 12 3 7 8"/><line x1="12" y1="3" x2="12" y2="15"/></svg>
              <div>点击或拖拽上传产品图片</div>
              <input type="file" accept="image/*" multiple style="display:none;">
            </div>
            <div class="upload-preview" id="reference-preview" style="display:none;"></div>
          </div>
          <div class="card">
            <div class="card-header"><span class="card-title">补充素材（选填）</span></div>
            <div class="upload-zone" id="attachment-upload">
              <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21.44 11.05l-9.19 9.19a6 6 0 01-8.49-8.49l9.19-9.19a4 4 0 015.66 5.66l-9.2 9.19a2 2 0 01-2.83-2.83l8.49-8.48"/></svg>
              <div>Logo、包装图、说明书等</div>
              <input type="file" accept="image/*" multiple style="display:none;">
            </div>
            <div class="upload-preview" id="attachment-preview" style="display:none;"></div>
          </div>
          <div class="card">
            <div class="card-header">
              <span class="card-title">变体（选填，如颜色/材质）</span>
              <button type="button" class="btn btn-primary btn-sm" onclick="addVariant()">+ 变体</button>
            </div>
            <div id="variant-list"></div>
          </div>
          <div class="card">
            <div class="card-header">
              <span class="card-title">规格（选填，如容量/尺寸）</span>
              <button type="button" class="btn btn-primary btn-sm" onclick="addSpec()">+ 规格</button>
            </div>
            <div id="spec-list"></div>
          </div>
          <div class="card">
            <div class="card-header">
              <span class="card-title">SKU（自动组合）</span>
              <span id="sku-count" style="font-size:0.85rem;color:var(--gray-500);"></span>
            </div>
            <div id="sku-result">
              <div style="color:var(--gray-400);font-size:0.85rem;">添加变体和规格后自动生成 SKU</div>
            </div>
          </div>
          <div class="card">
            <div class="card-header"><span class="card-title">生成配置</span></div>
                      <div class="form-row-3" style="margin-top:12px">
              <div class="form-group">
                <label class="form-label" for="stock">库存</label>
                <input class="form-input" id="stock" name="stock" type="number" min="0" value="100">
              </div>
              <div class="form-group">
                <label class="form-label" for="weightKg">重量(kg)</label>
                <input class="form-input" id="weightKg" name="weightKg" type="number" min="0" step="0.1" value="1">
              </div>
              <div class="form-group">
                <label class="form-label" for="basePrice">基本售价</label>
                <input class="form-input" id="basePrice" name="basePrice" type="number" min="0" step="0.01" value="0">
              </div>
            </div>
          <div class="form-row-4">
              <div class="form-group">
                <label class="form-label" for="batchCount">生成几组</label>
                <input class="form-input" id="batchCount" name="batchCount" type="number" min="1" value="1">
              </div>
              <div class="form-group">
                <label class="form-label" for="mainImageCount">主图数量</label>
                <input class="form-input" id="mainImageCount" name="mainImageCount" type="number" min="0" value="1">
              </div>
              <div class="form-group">
                <label class="form-label" for="detailImageCount">详情图数量</label>
                <input class="form-input" id="detailImageCount" name="detailImageCount" type="number" min="0" value="1">
              </div>
              <div class="form-group">
                <label class="form-label" for="skuImageCount">SKU 图数量</label>
                <input class="form-input" id="skuImageCount" name="skuImageCount" type="number" min="0" value="1">
              </div>
            </div>
          </div>
          <div style="display:flex;gap:12px;margin-top:8px;">
            <button type="submit" class="btn btn-primary" id="submit-btn">提交任务</button>
            <button type="reset" class="btn btn-secondary">重置</button>
          </div>
        </form>
      </main>
    </div>
  </div>
  <div id="toast-container" class="toast-container"></div>
  <script src="assets/js/api.js"></script>
  <script src="assets/js/create.js"></script>
</body>
</html>
