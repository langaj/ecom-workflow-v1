name = "ecom-workflow-v1"
main = "worker/index.js"
compatibility_date = "2025-04-01"

# Account ID for the Cloudflare account to use
# (set this to avoid the multi-account prompt)
account_id = "8f89a83cd9cc730f7dd298e536eea9b2"

# D1 Database
[[d1_databases]]
binding = "DB"
database_name = "ecom-workflow-db"
database_id = "CHANGE_ME"

# R2 Storage
[[r2_buckets]]
binding = "R2"
bucket_name = "ecom-workflow-storage"

# Environment variables
[vars]
R2_PUBLIC_URL = ""

[env.production]
[env.production.vars]
R2_PUBLIC_URL = "https://storage.yourdomain.com"

[env.staging]
[env.staging.vars]
R2_PUBLIC_URL = ""
