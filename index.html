<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Ecom Workflow - 仪表盘</title>
  <link rel="stylesheet" href="assets/css/style.css">
</head>
<body>
  <div class="app-layout">
    <!-- Sidebar -->
    <aside class="sidebar">
      <div class="sidebar-brand">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <path d="M4 7V4h16v3"/>
          <path d="M9 20h6"/>
          <path d="M12 4v16"/>
          <rect x="3" y="7" width="18" height="13" rx="2"/>
        </svg>
        <span>Ecom Workflow</span>
      </div>
      <nav class="sidebar-nav">
        <a href="index.html" class="active">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <rect x="3" y="3" width="7" height="7"/>
            <rect x="14" y="3" width="7" height="7"/>
            <rect x="14" y="14" width="7" height="7"/>
            <rect x="3" y="14" width="7" height="7"/>
          </svg>
          <span>仪表盘</span>
        </a>
        <a href="jobs.html">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <path d="M9 5H7a2 2 0 00-2 2v12a2 2 0 002 2h10a2 2 0 002-2V7a2 2 0 00-2-2h-2"/>
            <rect x="9" y="3" width="6" height="4" rx="1"/>
            <path d="M9 14l2 2 4-4"/>
          </svg>
          <span>任务列表</span>
        </a>
        <a href="create.html">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <circle cx="12" cy="12" r="10"/>
            <path d="M12 8v8M8 12h8"/>
          </svg>
          <span>创建任务</span>
        </a>
        <a href="config.html">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <circle cx="12" cy="12" r="3"/>
            <path d="M12 1v2M12 21v2M4.22 4.22l1.42 1.42M18.36 18.36l1.42 1.42M1 12h2M21 12h2M4.22 19.78l1.42-1.42M18.36 5.64l1.42-1.42"/>
          </svg>
          <span>系统配置</span>
        </a>
      </nav>
    </aside>

    <!-- Main -->
    <div class="main-area">
      <header class="topbar">
        <h1 class="topbar-title">仪表盘</h1>
      </header>
      <main class="page-content">

        <!-- Stats -->
        <div class="stats-grid">
          <div class="stat-card">
            <span class="stat-label">总批次数</span>
            <span class="stat-value" id="stat-total">-</span>
          </div>
          <div class="stat-card">
            <span class="stat-label">执行中</span>
            <span class="stat-value" id="stat-running" style="color:var(--blue-600);">-</span>
          </div>
          <div class="stat-card">
            <span class="stat-label">已完成</span>
            <span class="stat-value" id="stat-completed" style="color:var(--green-600);">-</span>
          </div>
          <div class="stat-card">
            <span class="stat-label">失败</span>
            <span class="stat-value" id="stat-failed" style="color:var(--red-600);">-</span>
          </div>
        </div>

        <!-- Recent Tasks -->
        <div class="card">
          <div class="card-header">
            <span class="card-title">最近任务</span>
            <a href="jobs.html" class="btn btn-secondary btn-sm">查看全部</a>
          </div>
          <table class="data-table">
            <thead>
              <tr>
                <th>批次号</th>
                <th>任务名称</th>
                <th>状态</th>
                <th>创建时间</th>
              </tr>
            </thead>
            <tbody id="recent-tasks"></tbody>
          </table>
        </div>

      </main>
    </div>
  </div>

  <div id="toast-container" class="toast-container"></div>

  <script src="assets/js/api.js"></script>
  <script src="assets/js/dashboard.js"></script>
</body>
</html>
